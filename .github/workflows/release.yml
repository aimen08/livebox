name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npx vite build
        env:
          ELECTRON_DIST: "1"

      - name: Download mpv playback engine
        shell: pwsh
        run: |
          $url = "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260610/mpv-x86_64-20260610-git-304426c.7z"
          Invoke-WebRequest -Uri $url -OutFile mpv.7z
          7z e mpv.7z -ompv-extract mpv.exe
          New-Item -ItemType Directory -Force build-res/win/mpv | Out-Null
          Copy-Item mpv-extract/mpv.exe build-res/win/mpv/mpv.exe
          if (-not (Test-Path build-res/win/mpv/mpv.exe)) { throw "mpv.exe missing after extract" }

      - name: Package Windows installer
        run: npx electron-builder --win -p never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true   # don't fail the release if Actions storage quota is hit
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          generate_release_notes: true

  build-mac:
    # macos-14 (Sonoma, arm64), NOT macos-latest (Sequoia 15): Homebrew bottles
    # target the runner's OS, and a libmpv built on 15 references macOS-15 Swift
    # runtime symbols that don't exist on 14 — the bundled addon then fails to
    # load on Sonoma users and the app falls back to a separate mpv window.
    # Building on 14 keeps libmpv compatible with macOS 14 and newer.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install libmpv + dylibbundler
        run: brew install mpv dylibbundler

      - name: Build native embedded-mpv addon
        run: npm run build:native

      - name: Stage libmpv runtime (self-contained)
        run: npm run stage:mpv:mac

      - name: Build renderer
        run: npx vite build
        env:
          ELECTRON_DIST: "1"

      - name: Package macOS DMG
        run: npx electron-builder --mac -p never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true   # don't fail the release if Actions storage quota is hit
        with:
          name: mac-dmg
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/latest-mac.yml

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/latest-mac.yml
