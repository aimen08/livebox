<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#ff1a24"/>
    </linearGradient>
    <linearGradient id="glow" x1="256" y1="160" x2="256" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e50914" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e50914" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <ellipse cx="256" cy="270" rx="140" ry="100" fill="url(#glow)"/>
  <!-- TV Screen -->
  <rect x="120" y="150" width="272" height="180" rx="20" stroke="url(#accent)" stroke-width="12" fill="none"/>
  <!-- Play button -->
  <polygon points="228,210 228,300 308,255" fill="url(#accent)"/>
  <!-- TV Stand -->
  <line x1="200" y1="340" x2="312" y2="340" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="330" x2="256" y2="340" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
  <!-- Antenna -->
  <polyline points="310,140 256,150 202,140" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- LB Text -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="60" fill="#ffffff" letter-spacing="6">LIVEBOX</text>
</svg>
