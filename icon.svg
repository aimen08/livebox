<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1625"/>
      <stop offset="100%" stop-color="#0d0b14"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="120" x2="380" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff2d3a"/>
      <stop offset="100%" stop-color="#e50914"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="128" y1="130" x2="384" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#252230"/>
      <stop offset="100%" stop-color="#1a1722"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Glow behind screen -->
  <ellipse cx="256" cy="220" rx="130" ry="95" fill="#e50914" opacity="0.1"/>

  <!-- TV Screen -->
  <rect x="118" y="100" width="276" height="190" rx="22" fill="url(#screenGrad)"/>
  <rect x="118" y="100" width="276" height="190" rx="22" stroke="url(#accent)" stroke-width="7" fill="none"/>

  <!-- Play triangle -->
  <polygon points="226,158 226,232 298,195" fill="white"/>

  <!-- Signal waves top-right -->
  <path d="M354,84 C368,68 386,68 400,84" stroke="#e50914" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M364,72 C372,62 382,62 390,72" stroke="#e50914" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <circle cx="377" cy="64" r="4" fill="#ff2d3a"/>

  <!-- Stand neck -->
  <rect x="240" y="290" width="32" height="18" rx="4" fill="#e50914"/>
  <!-- Stand base -->
  <rect x="204" y="304" width="104" height="10" rx="5" fill="#e50914"/>

  <!-- LIVEBOX label -->
  <rect x="126" y="346" width="260" height="62" rx="16" fill="#e50914"/>

  <!-- LIVE white box -->
  <rect x="136" y="354" width="108" height="46" rx="10" fill="white"/>

  <!-- LIVE text (dark on white) -->
  <text x="190" y="390" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="40" fill="#e50914" letter-spacing="2">LIVE</text>

  <!-- BOX text (white on red) -->
  <text x="320" y="390" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="40" fill="white" letter-spacing="3">BOX</text>

  <!-- Bottom accent line -->
  <rect x="196" y="426" width="120" height="4" rx="2" fill="#e50914" opacity="0.4"/>
</svg>
